{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Theme toggle icon (sun/moon) visibility driven by html[data-theme] -->
<style>
  #theme-icon svg { vertical-align: middle; }
  #theme-icon .theme-icon-moon { display: none; }
  html[data-theme="dark"] #theme-icon .theme-icon-sun { display: none; }
  html[data-theme="dark"] #theme-icon .theme-icon-moon { display: inline; }
  /* Fix: .hidden is defined twice upstream; the second rule clobbers display:none,
     leaving the greedy-nav overflow button visible as an empty box. */
  #site-nav button.hidden { display: none; }
</style>

<!-- Copy-citation button styling and handler -->
<style>
  .copy-cite-btn {
    display: inline-block;
    margin-left: 0.5em;
    padding: 2px 10px;
    font-size: 0.8em;
    font-weight: 500;
    line-height: 1.5;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--global-border-color);
    border-radius: 4px;
    color: var(--global-text-color);
    vertical-align: baseline;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .copy-cite-btn:hover {
    background: var(--global-border-color);
  }
  .copy-cite-btn.copied {
    background: #2e7d32;
    border-color: #2e7d32;
    color: #fff;
  }
</style>
<script>
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('.copy-cite-btn');
    if (!btn) return;
    var p = btn.parentElement;
    var span = p && p.querySelector('.pub-citation');
    var text = span ? (span.getAttribute('data-citation') || span.textContent || '').trim() : '';
    if (!text || !navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(function () {
      var original = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function () {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1200);
    });
  });
</script>

<!-- Patent list + self-author highlight styling -->
<style>
  .author-self {
    font-weight: 700;
    background: linear-gradient(transparent 62%, rgba(255, 213, 79, 0.45) 62%);
    padding: 0 3px;
    border-radius: 2px;
  }
  html[data-theme="dark"] .author-self {
    background: linear-gradient(transparent 62%, rgba(255, 213, 79, 0.28) 62%);
    color: inherit;
  }

  .patent-list { margin-top: 1.25em; }

  .patent-entry {
    padding: 1em 1.25em;
    margin: 0 0 1em 0;
    border: 1px solid var(--global-border-color);
    border-left: 4px solid var(--global-masthead-link-color, #555);
    border-radius: 4px;
    background: transparent;
  }

  .patent-entry .patent-title {
    margin: 0 0 0.25em 0;
    font-size: 1.15em;
    line-height: 1.35;
  }

  .patent-entry .patent-number {
    margin: 0 0 0.5em 0;
    font-size: 0.95em;
    color: var(--global-text-color-light, inherit);
  }

  .patent-entry .patent-number code {
    font-size: 0.95em;
    padding: 1px 6px;
  }

  .patent-entry .patent-inventors {
    margin: 0;
    font-size: 0.95em;
    line-height: 1.5;
  }

  .patent-status {
    display: inline-block;
    margin-left: 0.5em;
    padding: 1px 8px;
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    border-radius: 10px;
    vertical-align: middle;
  }
  .patent-status--granted {
    background: #2e7d32;
    color: #fff;
  }
  .patent-status--pending {
    background: transparent;
    color: var(--global-text-color);
    border: 1px solid var(--global-border-color);
  }
</style>

<!-- end custom head snippets -->
